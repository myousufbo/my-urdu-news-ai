name: Update Urdu News

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-and-translate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Create data directory if not exists
      run: mkdir -p data
        
    - name: Install Dependencies
      run: npm install
      
    - name: Run Fetch & Translate Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node fetch_news.js
      
    - name: Commit and Push Updated News
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/news.json || echo "No changes to add"
        git commit -m "Auto-update: Latest translated news" || echo "No changes to commit"
        git push
